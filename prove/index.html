<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PersonaVerify</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-950 text-white min-h-screen p-6"><div class="max-w-2xl mx-auto">
<h1 class="text-2xl font-bold mb-6">🎭 PersonaVerify</h1>
<div class="bg-gray-900 rounded-xl p-6 border border-gray-800 space-y-3">
<h2 class="text-violet-400 font-semibold">Verify Account Link</h2>
<input placeholder="Account A URL (e.g. GitHub)" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none">
<input placeholder="Account B URL (e.g. Twitter)" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none">
<input placeholder="Hint (optional)" class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-3 text-white placeholder-gray-600 outline-none">
<button class="w-full bg-violet-600 hover:bg-violet-700 rounded-lg py-3 font-bold">🔗 Verify Link</button>
</div>
</div></body></html>
